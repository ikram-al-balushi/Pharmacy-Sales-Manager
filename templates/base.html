<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sales Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-pills text-success me-2"></i>
                <strong style="color: #28a745; font-size: 1.3em;">Anil Medical Store</strong>
                <small class="d-block" style="font-size: 0.7em; color: #6c757d;">Sales Dashboard</small>
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link" href="/stock">Stock</a>
                <a class="nav-link" href="/sales">Sales</a>
                <a class="nav-link" href="/analytics">Analytics</a>
                <a class="nav-link" href="/reports">Reports</a>
                <a class="nav-link" href="/ledger">Ledger</a>
                <a class="nav-link" href="/expenses">Expenses</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

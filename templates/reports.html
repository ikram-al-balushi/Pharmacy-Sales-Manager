{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Business Reports</h2>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h5>Generate Report</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Report Type</label>
                    <select class="form-control" id="reportType">
                        <option value="sales">Sales Report</option>
                        <option value="stock">Stock Report</option>
                        <option value="expenses">Expenses Report</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Period</label>
                    <select class="form-control" id="reportPeriod">
                        <option value="daily">Daily</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="generateReport()">Generate Report</button>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 id="reportTitle">Report Results</h5>
            </div>
            <div class="card-body">
                <div id="reportContent">
                    <p class="text-muted">Select report type and period, then click "Generate Report" to view results.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function generateReport() {
    const reportType = document.getElementById('reportType').value;
    const period = document.getElementById('reportPeriod').value;
    
    try {
        const response = await fetch('/generate_report', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                report_type: reportType,
                period: period
            })
        });
        
        const result = await response.json();
        displayReport(result);
    } catch (error) {
        document.getElementById('reportContent').innerHTML = '<p class="text-danger">Error generating report</p>';
    }
}

function displayReport(result) {
    const title = document.getElementById('reportTitle');
    const content = document.getElementById('reportContent');
    
    title.textContent = `${result.type.charAt(0).toUpperCase() + result.type.slice(1)} Report - ${result.period.charAt(0).toUpperCase() + result.period.slice(1)}`;
    
    if (result.data.length === 0) {
        content.innerHTML = '<p class="text-muted">No data found for selected period.</p>';
        return;
    }
    
    let tableHTML = '<div class="table-responsive"><table class="table table-striped"><thead><tr>';
    
    if (result.type === 'sales') {
        tableHTML += '<th>Invoice No</th><th>Customer</th><th>Amount</th><th>Payment</th><th>Date</th>';
        tableHTML += '</tr></thead><tbody>';
        result.data.forEach(row => {
            tableHTML += `<tr><td>${row[1]}</td><td>${row[2] || 'Walk-in'}</td><td>${row[4]}</td><td>${row[5]}</td><td>${row[6]}</td></tr>`;
        });
    } else if (result.type === 'stock') {
        tableHTML += '<th>Product</th><th>Quantity</th><th>Purchase Price</th><th>Selling Price</th><th>Party</th>';
        tableHTML += '</tr></thead><tbody>';
        result.data.forEach(row => {
            tableHTML += `<tr><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5] || '-'}</td></tr>`;
        });
    } else if (result.type === 'expenses') {
        tableHTML += '<th>Category</th><th>Amount</th><th>Description</th><th>Date</th>';
        tableHTML += '</tr></thead><tbody>';
        result.data.forEach(row => {
            tableHTML += `<tr><td>${row[1]}</td><td>${row[2]}</td><td>${row[3] || '-'}</td><td>${row[4]}</td></tr>`;
        });
    }
    
    tableHTML += '</tbody></table></div>';
    content.innerHTML = tableHTML;
}
</script>
{% endblock %}
